name: davids_army
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^14.2.0
  iconsax: ^0.0.8
  http: ^1.6.0
  url_launcher: ^6.2.5
  flutter_dotenv: ^6.0.0 
  font_awesome_flutter: ^10.7.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.0.0
  image_picker: ^1.0.7
  firebase_messaging: ^15.2.10
  firebase_storage: ^12.4.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/   # ✅ FIXED (your actual folder)

# 🔵 APP ICON
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/shield_icon.png   # ✅ MUST include extension

  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icons/shield_icon.png

# 🔥 SPLASH SCREEN
flutter_native_splash:
  color: "#FFFFFFF"
  image: assets/icons/shield_icon.png   # ✅ your splash image

  android: true
  ios: true

  android_12:
    image: assets/icons/shield_icon.png
    icon_background_color: "#FFFFFFF"